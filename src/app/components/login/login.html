<div class="login-wrapper" style="display: flex; height: 100vh; width: 100vw; overflow: hidden; margin: 0; padding: 0; box-sizing: border-box;">
  
  <div class="brand-side" style="flex: 1; position: relative; background: linear-gradient(135deg, #102a43 0%, #1976d2 100%); display: flex; align-items: center; justify-content: center; padding: 40px; color: white; box-sizing: border-box;">
    <div class="brand-info" style="position: relative; z-index: 2; max-width: 400px; display: flex; flex-direction: column; gap: 15px;">
      <h1 class="brand-logo" style="font-size: 3.5rem; font-weight: 900; margin: 0; padding: 0; letter-spacing: 2px; line-height: 1.1;">SGPD</h1>
      <h2 class="brand-title" style="font-size: 1.5rem; font-weight: 500; margin: 0; padding: 0; line-height: 1.4 !important; color: #e3f2fd; display: block;">
        Sistema de Gestión de Permisos Digitales
      </h2>
      <p class="brand-description" style="font-size: 0.95rem; opacity: 0.8; margin: 5px 0 0 0; padding: 0; line-height: 1.5;">
        Gestión eficiente y transparente de permisos institucionales.
      </p>
    </div>
  </div>

  <div class="form-side" style="width: 480px; min-width: 480px; background: #ffffff; display: flex; align-items: center; justify-content: center; padding: 30px; box-shadow: -5px 0 25px rgba(0,0,0,0.05); box-sizing: border-box; overflow-y: auto !important; height: 100vh;">
    <div class="login-box" style="width: 100%; max-width: 360px; display: block;">
      <h2 class="welcome-title" style="font-size: 1.6rem; color: #23272a; font-weight: 700; margin: 0 0 4px 0;">Bienvenido al Sistema</h2>
      <p class="welcome-subtitle" style="color: #657786; font-size: 0.9rem; margin: 0 0 20px 0;">Seleccione su rol e ingrese sus credenciales</p>

      <div class="role-group" style="display: flex; gap: 8px; margin-bottom: 25px;">
        <button mat-raised-button type="button" style="flex: 1; font-size: 0.85rem;" 
                [color]="rolSeleccionado === 'Empleado' ? 'primary' : ''"
                (click)="seleccionarRol('Empleado')">Empleado</button>
                
        <button mat-raised-button type="button" style="flex: 1; font-size: 0.85rem;" 
                [color]="rolSeleccionado === 'Secretaría' ? 'primary' : ''"
                (click)="seleccionarRol('Secretaría')">Secretaría</button>
                
        <button mat-raised-button type="button" style="flex: 1; font-size: 0.85rem;" 
                [color]="rolSeleccionado === 'Gerente' ? 'primary' : ''"
                (click)="seleccionarRol('Gerente')">Gerente</button>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="alEnviar()" style="display: flex; flex-direction: column; gap: 15px;">
        
        <div class="input-container" style="display: flex; flex-direction: column; gap: 4px;">
          <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Correo Institucional</label>
          <mat-form-field appearance="outline" style="width: 100%;">
            <input matInput type="email" formControlName="correo" placeholder="usuario@institucion.gob.ec">
            <mat-error *ngIf="loginForm.get('correo')?.hasError('email')">El formato no es válido</mat-error>
            <mat-error *ngIf="loginForm.get('correo')?.hasError('required')">El correo es obligatorio</mat-error>
          </mat-form-field>
        </div>

        <div class="input-container" style="display: flex; flex-direction: column; gap: 4px;">
          <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Contraseña</label>
          <mat-form-field appearance="outline" style="width: 100%;">
            <input matInput type="password" formControlName="contrasena" placeholder="Ingrese su contraseña">
            <mat-error *ngIf="loginForm.get('contrasena')?.hasError('required')">La contraseña es obligatoria</mat-error>
          </mat-form-field>
        </div>

        <button mat-raised-button color="primary" type="submit" style="width: 100%; padding: 12px 0; margin-top: 10px; font-weight: 600;" [disabled]="loginForm.invalid">
          Ingresar al Sistema
        </button>

      </form>

      <a href="#" style="display: block; text-align: center; margin-top: 20px; color: #1976d2; text-decoration: none; font-size: 0.9rem; font-weight: 500;">
        ¿No tienes cuenta? Regístrate aquí
      </a>
    </div>
  </div>

</div>
