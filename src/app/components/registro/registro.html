<div class="register-wrapper" style="display: flex; height: 100vh; width: 100vw; overflow: hidden; margin: 0; padding: 0; box-sizing: border-box; background-color: #f5f7fa;">
  
  <div class="brand-side" style="width: 40%; min-width: 380px; position: relative; background: linear-gradient(135deg, #102a43 0%, #1976d2 100%); display: flex; align-items: center; justify-content: center; padding: 40px; color: white; box-sizing: border-box;">
    <div class="brand-info" style="position: relative; z-index: 2; max-width: 380px; display: flex; flex-direction: column; gap: 12px;">
      <h1 class="brand-logo" style="font-size: 4.8rem; font-weight: 900; margin: 0; padding: 0; letter-spacing: 2px; line-height: 1.0;">SGPD</h1>
      <h2 class="brand-title" style="font-size: 2.2rem; font-weight: 700; margin: 0; padding: 0; line-height: 1.2 !important; color: #ffffff; display: block;">
        Sistema de Gestión de Permisos Digitales
      </h2>
      <p class="brand-description" style="font-size: 1rem; opacity: 0.8; margin: 8px 0 0 0; padding: 0; line-height: 1.4;">
        Gestión eficiente y transparente de permisos institucionales.
      </p>
    </div>
  </div>

  <div class="form-side" style="width: 60%; background: #ffffff; display: flex; align-items: center; justify-content: center; padding: 30px; box-shadow: -5px 0 25px rgba(0,0,0,0.05); box-sizing: border-box; overflow-y: auto !important; height: 100vh;">
    <div class="register-box" style="width: 100%; max-width: 520px; display: block; padding: 10px 0;">
      <h2 class="welcome-title" style="font-size: 1.6rem; color: #23272a; font-weight: 700; margin: 0 0 4px 0;">Crear Cuenta</h2>
      <p class="welcome-subtitle" style="color: #657786; font-size: 0.9rem; margin: 0 0 20px 0;">Complete los campos para registrarse en la plataforma</p>

      <form (ngSubmit)="alRegistrar()" style="display: flex; flex-direction: column; gap: 14px;">
        
        <div class="form-row" style="display: flex; gap: 16px; width: 100%;">
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Nombres</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="text" placeholder="Ej. Juan Carlos">
            </mat-form-field>
          </div>
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Apellidos</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="text" placeholder="Ej. Pérez Armas">
            </mat-form-field>
          </div>
        </div>

        <div class="form-row" style="display: flex; gap: 16px; width: 100%;">
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Cédula de Identidad</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="text" placeholder="17XXXXXXXX" maxlength="10">
            </mat-form-field>
          </div>
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Número de Celular</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="tel" placeholder="Ej. 09XXXXXXXX" maxlength="10">
            </mat-form-field>
          </div>
        </div>

        <div class="input-container" style="display: flex; flex-direction: column; gap: 4px;">
          <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Correo Institucional</label>
          <mat-form-field appearance="outline" style="width: 100%;">
            <input matInput type="email" placeholder="usuario@institucion.gob.ec">
          </mat-form-field>
        </div>

        <div class="form-row" style="display: flex; gap: 16px; width: 100%;">
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Contraseña</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="password" placeholder="Ingrese contraseña">
            </mat-form-field>
          </div>
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Confirmar Contraseña</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="password" placeholder="Repita contraseña">
            </mat-form-field>
          </div>
        </div>

        <button mat-raised-button color="primary" type="submit" style="width: 100%; padding: 12px 0; margin-top: 5px; font-weight: 600;">
          Registrar Usuario
        </button>

      </form>

      <a routerLink="/login" style="display: block; text-align: center; margin-top: 18px; color: #1976d2; text-decoration: none; font-size: 0.9rem; font-weight: 500; cursor: pointer;">
        ¿Ya tienes cuenta? Inicia sesión aquí
      </a>
    </div>
  </div>

</div>
