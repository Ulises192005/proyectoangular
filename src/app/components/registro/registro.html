<form (ngSubmit)="alRegistrar()" style="display: flex; flex-direction: column; gap: 14px;">
        
        <div class="form-row" style="display: flex; gap: 16px; width: 100%;">
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Nombres</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="text" name="nombres" [(ngModel)]="datosUsuario.nombres" placeholder="Ej. Juan Carlos" required>
            </mat-form-field>
          </div>
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Apellidos</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="text" name="apellidos" [(ngModel)]="datosUsuario.apellidos" placeholder="Ej. Pérez Armas" required>
            </mat-form-field>
          </div>
        </div>

        <div class="form-row" style="display: flex; gap: 16px; width: 100%;">
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Cédula de Identidad</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="text" name="cedula" [(ngModel)]="datosUsuario.cedula" placeholder="17XXXXXXXX" maxlength="10" required>
            </mat-form-field>
          </div>
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Número de Celular</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="tel" name="celular" [(ngModel)]="datosUsuario.celular" placeholder="Ej. 09XXXXXXXX" maxlength="10" required>
            </mat-form-field>
          </div>
        </div>

        <div class="input-container" style="display: flex; flex-direction: column; gap: 4px;">
          <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Correo Institucional</label>
          <mat-form-field appearance="outline" style="width: 100%;">
            <input matInput type="email" name="correo" [(ngModel)]="datosUsuario.correo" placeholder="usuario@institucion.gob.ec" required>
          </mat-form-field>
        </div>

        <div class="form-row" style="display: flex; gap: 16px; width: 100%;">
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Contraseña</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="password" name="contrasena" [(ngModel)]="datosUsuario.contrasena" placeholder="Ingrese contraseña" required>
            </mat-form-field>
          </div>
          <div class="input-container" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <label class="input-label" style="font-size: 0.85rem; font-weight: 600; color: #4a5568;">Confirmar Contraseña</label>
            <mat-form-field appearance="outline" style="width: 100%;">
              <input matInput type="password" name="confirmarContrasena" [(ngModel)]="datosUsuario.confirmarContrasena" placeholder="Repita contraseña" required>
            </mat-form-field>
          </div>
        </div>

        <button mat-raised-button color="primary" type="submit" style="width: 100%; padding: 12px 0; margin-top: 5px; font-weight: 600;">
          Registrar Usuario
        </button>

      </form>
